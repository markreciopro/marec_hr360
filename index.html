<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MAREC HR360 Workforce Intelligence Platform</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:'Inter',sans-serif;
background:#050505;
color:white;
margin:0;
}

/* HEADER */

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
background:#0a0a0a;
border-bottom:1px solid #1a1a1a;
}

.logo{
display:flex;
align-items:center;
gap:10px;
}

.logo img{
height:60px;
}

.status{
font-size:14px;
color:#aaa;
}

/* LAYOUT */

.container{
display:flex;
min-height:calc(100vh - 70px);
}

.sidebar{
width:220px;
background:#0a0a0a;
padding:20px;
border-right:1px solid #1a1a1a;
}

.sidebar button{
width:100%;
padding:10px;
margin-top:6px;
background:none;
border:none;
color:#aaa;
text-align:left;
cursor:pointer;
border-radius:4px;
}

.sidebar button:hover{
background:#111;
color:white;
}

.main{
flex:1;
padding:40px;
}

/* CARDS */

.card{
background:#0f0f0f;
border:1px solid #222;
border-radius:8px;
padding:20px;
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:20px;
}

.kpi{
font-size:28px;
font-weight:700;
}

/* INPUT */

input{
width:100%;
padding:10px;
margin-top:10px;
background:#111;
border:1px solid #333;
color:white;
border-radius:4px;
}

/* BUTTON */

.btn{
background:#c62828;
border:none;
padding:10px 16px;
margin-top:12px;
color:white;
cursor:pointer;
border-radius:5px;
}

.btn:hover{
background:#e53935;
}

/* UPLOAD */

.upload-box{
border:2px dashed #333;
padding:40px;
text-align:center;
border-radius:10px;
}

.file-item{
padding:6px;
font-size:14px;
border-bottom:1px solid #222;
}

canvas{
max-height:260px;
}

</style>

</head>

<body>

<!-- HEADER -->

<div class="topbar">

<div class="logo">
<img src="https://raw.githubusercontent.com/markreciopro/marec_hr360/main/Marec%20HR360.png">
<strong>MAREC HR360</strong>
</div>

<div class="status">
Workspace: <span id="workspaceName">Guest</span> |
API: <span id="apiStatus">Checking...</span>
</div>

</div>

<div class="container">

<!-- SIDEBAR -->

<div class="sidebar">

<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('analytics')">Analytics</button>
<button onclick="show('pipeline')">Pipeline</button>
<button onclick="show('datasets')">Datasets</button>
<button onclick="show('upload')">Upload HR Data</button>
<button onclick="show('account')">Account</button>

</div>

<div class="main">

<!-- DASHBOARD -->

<div id="dashboard" class="section">

<div class="grid">

<div class="card">
<h3>Attrition</h3>
<div class="kpi">12%</div>
</div>

<div class="card">
<h3>Engagement</h3>
<div class="kpi">74%</div>
</div>

<div class="card">
<h3>Headcount</h3>
<div class="kpi">1250</div>
</div>

</div>

<div class="card">
<h3>Attrition Trend</h3>
<canvas id="attritionChart"></canvas>
</div>

</div>

<!-- ANALYTICS -->

<div id="analytics" class="section" style="display:none">

<div class="card">
<h3>Recruiting Funnel</h3>
<canvas id="funnelChart"></canvas>
</div>

</div>

<!-- PIPELINE -->

<div id="pipeline" class="section" style="display:none">

<div class="card">
<h2>Data Processing Pipeline</h2>

<div id="pipelineStatus">
Waiting for HR dataset upload...
</div>

</div>

</div>

<!-- DATASETS -->

<div id="datasets" class="section" style="display:none">

<div class="card">

<h2>Datasets</h2>

<div id="datasetList">
No datasets loaded yet.
</div>

</div>

</div>

<!-- UPLOAD -->

<div id="upload" class="section" style="display:none">

<div class="upload-box" id="dropZone">

Drag HR datasets here

<input type="file" id="fileInput" multiple>

</div>

<div id="fileList"></div>

<button class="btn" onclick="uploadFiles()">Upload HR Files</button>

<div id="uploadStatus"></div>

</div>

<!-- ACCOUNT -->

<div id="account" class="section" style="display:none">

<div class="grid">

<div class="card">

<h2>Create Workspace</h2>

<input id="company" placeholder="Company Name">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button class="btn" onclick="createAccount()">Create Workspace</button>

</div>

<div class="card">

<h2>Login</h2>

<input id="loginEmail" placeholder="Email">
<input id="loginPassword" type="password" placeholder="Password">

<button class="btn" onclick="login()">Login</button>

</div>

</div>

</div>

</div>

</div>

<script>

/* API */

const API = "http://127.0.0.1:8000"

let token = localStorage.getItem("token")

/* NAVIGATION */

function show(id){
document.querySelectorAll(".section").forEach(s=>s.style.display="none")
document.getElementById(id).style.display="block"
}

/* API CHECK */

async function checkAPI(){

try{

const res = await fetch(API)

document.getElementById("apiStatus").innerText =
res.ok ? "Connected" : "Error"

}catch{

document.getElementById("apiStatus").innerText="Offline"

}

}

checkAPI()

/* ACCOUNT */

async function createAccount(){

const company=document.getElementById("company").value
const email=document.getElementById("email").value
const password=document.getElementById("password").value

await fetch(API+"/register",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({company,email,password})

})

alert("Workspace created")

}

async function login(){

const email=document.getElementById("loginEmail").value
const password=document.getElementById("loginPassword").value

const res=await fetch(API+"/login",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({email,password})

})

const data=await res.json()

token=data.token
localStorage.setItem("token",token)

document.getElementById("workspaceName").innerText=data.company

}

/* FILE HANDLING */

let files=[]

const fileInput=document.getElementById("fileInput")
const fileList=document.getElementById("fileList")

fileInput.addEventListener("change",(e)=>{

Array.from(e.target.files).forEach(file=>{
files.push(file)
})

renderFiles()

})

function renderFiles(){

fileList.innerHTML=""

files.forEach(file=>{

let div=document.createElement("div")
div.className="file-item"
div.innerText=file.name

fileList.appendChild(div)

})

}

/* DRAG DROP */

const dropZone=document.getElementById("dropZone")

dropZone.addEventListener("dragover",(e)=>e.preventDefault())

dropZone.addEventListener("drop",(e)=>{

e.preventDefault()

Array.from(e.dataTransfer.files).forEach(file=>{
files.push(file)
})

renderFiles()

})

/* UPLOAD */

async function uploadFiles(){

if(files.length===0){

alert("Upload HR files first")

return

}

let formData=new FormData()

files.forEach(file=>{
formData.append("files",file)
})

document.getElementById("uploadStatus").innerText="Uploading..."

await fetch(API+"/upload",{

method:"POST",
headers:{
Authorization:"Bearer "+token
},
body:formData

})

document.getElementById("uploadStatus").innerText="Upload complete"

document.getElementById("pipelineStatus").innerText=
"Python cleaning pipeline running..."

}

/* CHARTS */

new Chart(document.getElementById("attritionChart"),{
type:"line",
data:{
labels:["Jan","Feb","Mar","Apr","May"],
datasets:[{label:"Attrition %",data:[9,10,11,12,14]}]
}
})

new Chart(document.getElementById("funnelChart"),{
type:"bar",
data:{
labels:["Applicants","Screen","Interview","Offer","Hired"],
datasets:[{label:"Candidates",data:[500,200,120,60,40]}]
}
})

</script>

</body>
</html>
